<!DOCTYPE html>
<html lang="en">
<head>
    <title>Product Page</title>
    <style>
        body{
            font-family: Arial;
            background: #d11fab;
            text-align: center
        }
        .Product{
            background: rgb(82, 199, 245);
            margin: 20px;
            padding: 20px;
            border: 1px solid #eb81cb;
            box-shadow: 0 0 10px #8fe7531a;
        }
        button{
            background:blueviolet;
            color:aqua;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Online store</h1>
    <div class ="Product">
        <img src="Product.jpg" width="200" height="200"/>
        <h2>Smart Watch</h2>
        <p>Price: $2999</p>
        <button>Add to Cart</button>
    </div>
</body>
</html>
